<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precision POS — Settings</title>
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/settings.css" />
  <link rel="stylesheet" href="../outlets/outlets.css" />
  <link rel="stylesheet" href="../scanner/scanner.css" />
  <link rel="stylesheet" href="../exporter/exporter.css" />
</head>
<body>
<div class="app-shell">

  <!-- TITLEBAR -->
  <div class="titlebar">
    <div class="titlebar-brand">
      <span class="material-symbols-rounded filled">inventory_2</span>
      Precision POS
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize"><span class="material-symbols-rounded">remove</span></button>
      <button class="titlebar-btn" id="btn-maximize"><span class="material-symbols-rounded">crop_square</span></button>
      <button class="titlebar-btn close" id="btn-close"><span class="material-symbols-rounded">close</span></button>
    </div>
  </div>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar">
          <img src="../../../assets/Public/Images/logo.png" alt="App Logo" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Precision POS</div>
          <div class="sidebar-user-role">Inventory System</div>
        </div>
      </div>
      <div class="sidebar-section-label">Main Menu</div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-spacer"></div>

      <!-- User Profile Action -->
      <button class="nav-item" style="margin-bottom: var(--space-4); margin-top: auto;" onclick="toggleProfileMenu(event)">
        <!-- FontAwesome SVG -->
        <svg style="width: 20px; height: 20px; flex-shrink: 0;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M224 248a120 120 0 1 0 0-240 120 120 0 1 0 0 240zm-29.7 56C95.8 304 16 383.8 16 482.3 16 498.7 29.3 512 45.7 512l356.6 0c16.4 0 29.7-13.3 29.7-29.7 0-98.5-79.8-178.3-178.3-178.3l-59.4 0z"/></svg>
        <span class="nav-label">Alex Sterling</span>
      </button>
    </aside>

    <main class="page-content">
      <div class="page-header fade-in-up">
        <div>
          <h1 class="page-title">Settings</h1>
          <p class="page-subtitle">Application preferences and configuration.</p>
        </div>
        <div class="version-badge">
          <span class="material-symbols-rounded" style="font-size:16px;">info</span>
          Precision POS v1.0.0
        </div>
      </div>

      <div class="settings-grid">
        <!-- Settings Nav -->
        <div class="card fade-in-up" style="padding: var(--space-4);">
          <div class="settings-nav">
            <button class="settings-nav-item active" id="nav-store"         onclick="loadSection('store', this)">
              <span class="material-symbols-rounded">store</span> Store Info
            </button>
            <button class="settings-nav-item" id="nav-display"              onclick="loadSection('display', this)">
              <span class="material-symbols-rounded">palette</span> Display
            </button>
            <button class="settings-nav-item" id="nav-receipts"             onclick="loadSection('receipts', this)">
              <span class="material-symbols-rounded">receipt</span> Receipts
            </button>
            <button class="settings-nav-item" id="nav-tax"                  onclick="loadSection('tax', this)">
              <span class="material-symbols-rounded">percent</span> Tax &amp; Currency
            </button>
            <button class="settings-nav-item" id="nav-notifications"        onclick="loadSection('notifications', this)">
              <span class="material-symbols-rounded">notifications</span> Notifications
            </button>
            <button class="settings-nav-item" id="nav-region"               onclick="loadSection('region', this)">
              <span class="material-symbols-rounded">public</span> Region &amp; Currency
            </button>
          </div>
        </div>

        <!-- Dynamic Panel Container -->
        <div class="card settings-section active fade-in-up" id="settings-panel">
          <div class="settings-loading">
            <span class="material-symbols-rounded" style="font-size:32px;opacity:0.3;">tune</span>
            <span>Loading…</span>
          </div>
        </div>

      </div><!-- end settings-grid -->
    </main>
  </div>
</div>

<script src="../../../data/store.js"></script>
<script src="../settings/region/countries-data.js"></script>
<script src="../settings/region/currency.js"></script>
<script src="../../../renderer/nav.js"></script>
<script src="../../../window-manager/ui.js"></script>
<script>
// ── Settings Panel Loader ────────────────────────────────────
const SECTION_MAP = {
  store:         { path: '../settings/store/',         js: 'store.js',         css: 'store.css'         },
  display:       { path: '../settings/display/',       js: 'display.js',       css: 'display.css'       },
  receipts:      { path: '../settings/receipts/',      js: 'receipts.js',      css: 'receipts.css'      },
  tax:           { path: '../settings/tax/',           js: 'tax.js',           css: 'tax.css'           },
  notifications: { path: '../settings/notifications/', js: 'notifications.js', css: 'notifications.css' },
  region:        { path: '../settings/region/',        js: 'region.js',        css: 'region.css'        },
};

const loadedScripts = new Set();
const loadedStyles  = new Set();
let activeSection   = null;

async function loadSection(name, btn) {
  if (activeSection === name) return;
  activeSection = name;

  // Update nav active state
  document.querySelectorAll('.settings-nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const panel   = document.getElementById('settings-panel');
  const section = SECTION_MAP[name];
  if (!section || !panel) return;

  // Show loading state
  panel.innerHTML = `<div class="settings-loading">
    <span class="material-symbols-rounded" style="font-size:32px;opacity:0.2;animation:spin 1s linear infinite;">sync</span>
  </div>`;

  try {
    // 1. Load CSS (once)
    if (!loadedStyles.has(name)) {
      const link = document.createElement('link');
      link.rel  = 'stylesheet';
      link.href = section.path + section.css;
      document.head.appendChild(link);
      loadedStyles.add(name);
    }

    // 2. Fetch HTML partial
    const res  = await fetch(section.path + name + '.html');
    const html = await res.text();
    panel.innerHTML = html;

    // 3. Load JS (once) — script runs on append
    if (!loadedScripts.has(name)) {
      await new Promise((resolve, reject) => {
        const s   = document.createElement('script');
        s.src     = section.path + section.js;
        s.onload  = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
      });
      loadedScripts.add(name);
    } else {
      // Re-init panel if already loaded (re-render after navigation)
      const initFns = {
        store:         () => typeof StoreSettings         !== 'undefined' && StoreSettings.init(),
        display:       () => typeof DisplaySettings       !== 'undefined' && DisplaySettings.init(),
        receipts:      () => typeof ReceiptSettings       !== 'undefined' && ReceiptSettings.init(),
        tax:           () => typeof TaxSettings           !== 'undefined' && TaxSettings.init(),
        notifications: () => typeof NotifSettings         !== 'undefined' && NotifSettings.init(),
        region:        () => typeof RegionSettings        !== 'undefined' && RegionSettings.init(),
      };
      initFns[name]?.();
    }

  } catch (err) {
    panel.innerHTML = `<div class="settings-loading" style="color:var(--error);">
      <span class="material-symbols-rounded">error</span>
      <span>Failed to load section. ${err.message}</span>
    </div>`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initTitlebar();
  initNav('settings');
  // Load default section
  loadSection('store', document.getElementById('nav-store'));
});
</script>
<script src="../../../platform/platform.js"></script>
<script src="../../../chatbot/chatbot.js"></script>
<script src="../../../outlets/outlets.js"></script>
<script src="../../../scanner/scanner.js"></script>
<script src="../../../exporter/exporter.js"></script>
<script src="../../../alerts/alerts.js"></script>
</body>
</html>
