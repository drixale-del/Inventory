<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Anomalies | Smart Notifications</title>
  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/components.css">
  <link rel="stylesheet" href="anomalies.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap">
  
  <script defer src="../../../../../assets/local-icon-mapper.js"></script>
</head>
<body>
<div class="app-shell">
  <!-- TITLEBAR -->
  <div class="titlebar">
    <div class="titlebar-brand">
      <span class="material-symbols-rounded filled">inventory_2</span>
      Precision POS
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize"><span class="material-symbols-rounded">remove</span></button>
      <button class="titlebar-btn" id="btn-maximize"><span class="material-symbols-rounded">crop_square</span></button>
      <button class="titlebar-btn close" id="btn-close"><span class="material-symbols-rounded">close</span></button>
    </div>
  </div>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar">
          <img src="../../../../../assets/Public/Images/logo.png" alt="App Logo" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Precision POS</div>
          <div class="sidebar-user-role">Inventory System</div>
        </div>
      </div>
      <div class="sidebar-section-label">Main Menu</div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-spacer"></div>
      
      <button class="nav-item" style="margin-bottom: var(--space-2); margin-top: auto;" onclick="toggleProfileMenu(event)">
        <svg style="width: 20px; height: 20px; flex-shrink: 0;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M224 248a120 120 0 1 0 0-240 120 120 0 1 0 0 240zm-29.7 56C95.8 304 16 383.8 16 482.3 16 498.7 29.3 512 45.7 512l356.6 0c16.4 0 29.7-13.3 29.7-29.7 0-98.5-79.8-178.3-178.3-178.3l-59.4 0z"/></svg>
        <span class="nav-label">Alex Sterling</span>
      </button>

      <div style="padding: var(--space-4) var(--space-5); font-size: var(--text-label-sm); color: var(--on-surface-variant);">
        Main Warehouse · v1.0.0
      </div>
    </aside>

    <main class="page-content" id="main-content" style="overflow-y: auto;">
      <header class="page-header">
        <div>
          <h1 class="page-title">Sales Anomalies Detection</h1>
          <p class="page-subtitle">Real-time monitoring of unusual deviations in product sales velocity.</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-secondary" onclick="location.reload()">
            <span class="material-symbols-rounded">analytics</span>
            Full Report
          </button>
        </div>
      </header>

      <section id="anomaly-list" class="anomaly-container">
        <div class="skeleton" style="height: 180px; width: 100%;"></div>
        <div class="skeleton" style="height: 180px; width: 100%;"></div>
      </section>
    </main>
  </div>
</div>

<script src="../../../../renderer/nav.js"></script>
<script src="../../../../window-manager/ui.js"></script>
<script src="anomalies.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initNav('smart_notifications');
    initTitlebar();
  });
</script>
</body>
</html>
