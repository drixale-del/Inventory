 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camera Barcode Scanner</title>
    <!-- ZXing Library for high-fidelity decoding -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <link rel="stylesheet" href="scanner.css">
  <script defer src="../../assets/local-icon-mapper.js"></script>
</head>
<body>
    <div class="camera-scanner-module">
        <div class="video-container">
            <video id="video" width="100%" height="100%"></video>
            
            <!-- Scanning ROI (Region of Interest) Box -->
            <div class="scanner-overlay">
                <div class="scanner-box">
                    <div class="scanner-line"></div>
                </div>
                <div class="scanner-instructions">Align barcode within the frame</div>
            </div>

            <!-- Visual Feedback Flash -->
            <div id="scan-flash" class="scan-flash"></div>
        </div>

        <div class="camera-controls">
            <button id="btn-start-camera" class="btn-camera">
                <svg  class="material-symbols-rounded" style="width: 1em; height: 1em; vertical-align: -0.125em;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><!--! Font Awesome Free 7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2026 Fonticons, Inc. --><path fill="currentColor" d="M96 64c-35.3 0-64 28.7-64 64l0 256c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-256c0-35.3-28.7-64-64-64L96 64zM464 336l73.5 58.8c4.2 3.4 9.4 5.2 14.8 5.2 13.1 0 23.7-10.6 23.7-23.7l0-240.6c0-13.1-10.6-23.7-23.7-23.7-5.4 0-10.6 1.8-14.8 5.2L464 176 464 336z"/></svg>
                Start Camera
            </button>
            <button id="btn-stop-camera" class="btn-camera stop" style="display:none;">
                <svg  class="material-symbols-rounded" style="width: 1em; height: 1em; vertical-align: -0.125em;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><!--! Font Awesome Free 7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2026 Fonticons, Inc. --><path fill="currentColor" d="M41-24.9c-9.4-9.4-24.6-9.4-33.9 0S-2.3-.3 7 9.1l528 528c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-153-153 0-222.2c0-35.3-28.7-64-64-64L129.8 64 41-24.9zM32 128l0 256c0 35.3 28.7 64 64 64l256 0c7.8 0 15.3-1.4 22.2-4L36 105.8c-2.6 6.9-4 14.4-4 22.2zM464 336l73.5 58.8c4.2 3.4 9.4 5.2 14.8 5.2 13.1 0 23.7-10.6 23.7-23.7l0-240.6c0-13.1-10.6-23.7-23.7-23.7-5.4 0-10.6 1.8-14.8 5.2L464 176 464 336z"/></svg>
                Stop Camera
            </button>
            <div id="camera-status" class="camera-status">Status: Standby</div>
        </div>

        <!-- Hidden Audio for feedback -->
        <audio id="scan-sound-success" src="../../../assets/sounds/success.mp3"></audio>
        <audio id="scan-sound-error" src="../../../assets/sounds/error.mp3"></audio>
    </div>

    <script src="scanner.js"></script>
</body>
</html>
