<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="scanner.css">
  <script defer src="../../assets/local-icon-mapper.js"></script>
</head>
<body>
  <!-- Floating Barcode Scanner Component -->
  <div id="barcode-scanner-container" class="barcode-scanner-container">
    <div class="scanner-status" id="scanner-status">
      <svg  class="material-symbols-rounded" style="width: 1em; height: 1em; vertical-align: -0.125em;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--! Font Awesome Free 7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free (Icons: CC BY 4.0, Fonts: SIL OFL 1.1, Code: MIT License) Copyright 2026 Fonticons, Inc. --><path fill="currentColor" d="M32 32C14.3 32 0 46.3 0 64L0 448c0 17.7 14.3 32 32 32s32-14.3 32-32L64 64c0-17.7-14.3-32-32-32zm88 0c-13.3 0-24 10.7-24 24l0 400c0 13.3 10.7 24 24 24s24-10.7 24-24l0-400c0-13.3-10.7-24-24-24zm72 32l0 384c0 17.7 14.3 32 32 32s32-14.3 32-32l0-384c0-17.7-14.3-32-32-32s-32 14.3-32 32zm208-8l0 400c0 13.3 10.7 24 24 24s24-10.7 24-24l0-400c0-13.3-10.7-24-24-24s-24 10.7-24 24zm-96 0l0 400c0 13.3 10.7 24 24 24s24-10.7 24-24l0-400c0-13.3-10.7-24-24-24s-24 10.7-24 24z"/></svg>
      <span class="status-text">Scanner Ready</span>
    </div>
    
    <!-- Hidden but focused input field for keyboard emulation -->
    <input type="text" id="barcode-input" class="barcode-input-field" autofocus placeholder="Scan Barcode..." autocomplete="off">
    
    <div class="scanner-feedback" id="scanner-feedback">
      <!-- Success/Error messages appear here -->
    </div>
  </div>

  <!-- Audio Elements for Feedback -->
  <audio id="sound-success" src="../../../assets/sounds/success.mp3" preload="auto"></audio>
  <audio id="sound-error" src="../../../assets/sounds/error.mp3" preload="auto"></audio>

  <script src="scanner.js"></script>
</body>
</html>
